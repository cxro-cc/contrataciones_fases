name: Generar y Publicar Reporte

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Crear credenciales de Google
      run: echo '${{ secrets.GDRIVE_CREDENTIALS }}' > credentials.json

    - name: 5. Descargar Excels privados de Drive
      run: python descargar_drive.py

    - name: 6. Ejecutar script principal
      env:
        TZ: 'America/Mexico_City'
      run: |
        python generar_reporte.py \
          --uas Candidatos_UAS.xlsx \
          --upe Candidatos_UPE.xlsx \
          --catalogo Unidades_Inauguradas_fases.xlsx \
          --especial Fase_Especial.xlsx \
          --plantilla plantilla_reporte.html \
          --salida index.html

    - name: 7. Limpiar credenciales por seguridad
      run: rm credentials.json

    - name: 8. Guardar (Commit) el nuevo HTML
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated update: Reporte de candidatos"
        file_pattern: 'index.html'